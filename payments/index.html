<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payments — The Lingo Legacy</title>
  <style>
    :root { color-scheme: dark; --gold:#f7c948; --ink:#071017; --panel:#101b24; --text:#eaf6ff; --muted:#9fb3c8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background: radial-gradient(circle at top, #172533, var(--ink)); color:var(--text); }
    main { min-height:100vh; display:grid; place-items:center; padding:32px; }
    .card { width:min(760px, 100%); background:rgba(16,27,36,.92); border:1px solid rgba(247,201,72,.28); border-radius:24px; padding:32px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    a { color:var(--gold); }
    h1 { margin:0 0 12px; font-size:clamp(2rem, 5vw, 4rem); letter-spacing:.03em; }
    p { color:var(--muted); line-height:1.6; }
    .actions { display:flex; flex-wrap:wrap; gap:14px; margin-top:28px; }
    button, .button { border:0; border-radius:999px; padding:14px 22px; font-weight:700; cursor:pointer; text-decoration:none; }
    button { background:var(--gold); color:#111; }
    .button { background:#1d2f3f; color:var(--text); border:1px solid rgba(255,255,255,.12); }
    .note { margin-top:18px; font-size:.95rem; }
    .error { color:#ffb4b4; }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
  <link rel="stylesheet" href="/assets/legacy-universe.css" />
</head>
<body>
  <main>
    <section class="card">
      <p><a href="/">← Back to home</a></p>
      <h1>Support The Lingo Legacy</h1>
      <p>Make a secure one-time credit-card payment while subscriptions and memberships are being prepared.</p>
      <div class="actions">
        <button id="pay-once" type="button">Pay by credit card</button>
        <a class="button" href="mailto:dlingo@thelingolegacy.com?subject=Subscription%20waitlist">Join subscription waitlist</a>
        <a class="button" href="mailto:dlingo@thelingolegacy.com">Contact the team</a>
      </div>
      <p id="message" class="note"></p>
    </section>
  </main>
  <script>
    async function startCheckout(mode) {
      const message = document.getElementById('message');
      message.className = 'note';
      message.textContent = 'Opening secure checkout...';

      try {
        const response = await fetch('/api/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode })
        });
        const data = await response.json();
        if (!response.ok || !data.url) throw new Error(data.error || 'Checkout failed.');
        window.location.href = data.url;
      } catch (error) {
        message.className = 'note error';
        message.textContent = error.message;
      }
    }

    document.getElementById('pay-once').addEventListener('click', () => startCheckout('payment'));
  </script>
  <script defer src="/assets/legacy-universe.js"></script>
</body>
</html>
